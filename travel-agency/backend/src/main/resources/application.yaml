spring:
  application:
    name: travel-agency-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/travelagency
    username: postgres
    password: 1811
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/Tingeso_Db
          jwt-set-uri: http://localhost:8080/realms/Tingeso_Db/protocol/openid-connect/certs

# Keycloak client secret - se sobreescribe con variable de entorno KEYCLOAK_CLIENT-SECRET
keycloak:
  client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}

server:
  port: 8090
  servlet:
    context-path: /

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
