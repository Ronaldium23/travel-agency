version: '3.9'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: travelagency-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1811
      POSTGRES_DB: travelagency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travelagency-network

  # Backend - Réplica 1
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelagency-backend-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelagency
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1811
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Tingeso_Db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/Tingeso_Db/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-secret}
      SERVER_PORT: 8090
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - travelagency-network
    restart: unless-stopped

  # Backend - Réplica 2
  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelagency-backend-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelagency
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1811
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Tingeso_Db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/Tingeso_Db/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-secret}
      SERVER_PORT: 8090
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - travelagency-network
    restart: unless-stopped

  # Backend - Réplica 3
  backend-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelagency-backend-3
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelagency
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1811
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/Tingeso_Db
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/Tingeso_Db/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-secret}
      SERVER_PORT: 8090
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - travelagency-network
    restart: unless-stopped

  # Frontend + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travelagency-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - travelagency-network
    restart: unless-stopped

  # Keycloak (Opcional pero recomendado)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: travelagency-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: 1811
      KC_PROXY: edge
      KC_HOSTNAME: keycloak
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev
    networks:
      - travelagency-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  travelagency-network:
    driver: bridge
